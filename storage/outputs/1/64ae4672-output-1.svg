<svg width="100%" viewBox="0 0 900 650"><rect width="100%" height="100%" fill="#fafbfc"/><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#5f6368"/></marker></defs><text x="450" y="35" text-anchor="middle" font-size="18" fill="#202124" font-weight="500">RAG 检索增强生成技术架构</text><g id="data-source"><rect x="60" y="80" width="140" height="70" rx="8" fill="#e8f0fe" stroke="#aecbfa" stroke-width="2"/><text x="130" y="110" text-anchor="middle" font-size="13" fill="#1a73e8" font-weight="500">📄 数据源</text><text x="130" y="130" text-anchor="middle" font-size="11" fill="#5f6368">文档/PDF/网页/数据库</text></g><g id="chunking"><rect x="260" y="80" width="140" height="70" rx="8" fill="#e6f4ea" stroke="#a8dab5" stroke-width="2"/><text x="330" y="110" text-anchor="middle" font-size="13" fill="#1e8e3e" font-weight="500">✂️ 文档分块</text><text x="330" y="130" text-anchor="middle" font-size="11" fill="#5f6368">Chunking / 切片处理</text></g><g id="embedding"><rect x="460" y="80" width="140" height="70" rx="8" fill="#fef7e0" stroke="#feefc3" stroke-width="2"/><text x="530" y="110" text-anchor="middle" font-size="13" fill="#f29900" font-weight="500">🔢 向量化</text><text x="530" y="130" text-anchor="middle" font-size="11" fill="#5f6368">Embedding Model</text></g><g id="vector-db"><rect x="680" y="80" width="160" height="70" rx="8" fill="#fce8e6" stroke="#f6aea9" stroke-width="2"/><text x="760" y="110" text-anchor="middle" font-size="13" fill="#d93025" font-weight="500">💾 向量数据库</text><text x="760" y="130" text-anchor="middle" font-size="11" fill="#5f6368">Milvus/Pinecone/Chroma</text></g><g id="user-query"><rect x="60" y="200" width="140" height="70" rx="8" fill="#e8f0fe" stroke="#aecbfa" stroke-width="2"/><text x="130" y="230" text-anchor="middle" font-size="13" fill="#1a73e8" font-weight="500">👤 用户查询</text><text x="130" y="250" text-anchor="middle" font-size="11" fill="#5f6368">自然语言问题输入</text></g><g id="query-embed"><rect x="260" y="200" width="140" height="70" rx="8" fill="#fef7e0" stroke="#feefc3" stroke-width="2"/><text x="330" y="230" text-anchor="middle" font-size="13" fill="#f29900" font-weight="500">🔍 查询向量化</text><text x="330" y="250" text-anchor="middle" font-size="11" fill="#5f6368">Query Embedding</text></g><g id="retrieval"><rect x="460" y="200" width="140" height="70" rx="8" fill="#e6f4ea" stroke="#a8dab5" stroke-width="2"/><text x="530" y="230" text-anchor="middle" font-size="13" fill="#1e8e3e" font-weight="500">📚 相似检索</text><text x="530" y="250" text-anchor="middle" font-size="11" fill="#5f6368">Top-K 向量召回</text></g><g id="rerank"><rect x="680" y="200" width="160" height="70" rx="8" fill="#e6f4ea" stroke="#a8dab5" stroke-width="2"/><text x="760" y="230" text-anchor="middle" font-size="13" fill="#1e8e3e" font-weight="500">🎯 重排序</text><text x="760" y="250" text-anchor="middle" font-size="11" fill="#5f6368">Rerank / 精排优化</text></g><g id="prompt"><rect x="360" y="320" width="180" height="70" rx="8" fill="#e8f0fe" stroke="#aecbfa" stroke-width="2"/><text x="450" y="350" text-anchor="middle" font-size="13" fill="#1a73e8" font-weight="500">📝 Prompt 构建</text><text x="450" y="370" text-anchor="middle" font-size="11" fill="#5f6368">上下文 + 查询拼接</text></g><g id="llm"><rect x="360" y="440" width="180" height="70" rx="8" fill="#fce8e6" stroke="#f6aea9" stroke-width="2"/><text x="450" y="470" text-anchor="middle" font-size="13" fill="#d93025" font-weight="500">🤖 大语言模型</text><text x="450" y="490" text-anchor="middle" font-size="11" fill="#5f6368">GPT/Claude/LLaMA等</text></g><g id="output"><rect x="360" y="560" width="180" height="60" rx="8" fill="#e6f4ea" stroke="#a8dab5" stroke-width="2"/><text x="450" y="595" text-anchor="middle" font-size="14" fill="#1e8e3e" font-weight="500">✨ 生成回答</text></g><line x1="200" y1="115" x2="260" y2="115" stroke="#5f6368" stroke-width="2" marker-end="url(#arrow)"/><line x1="400" y1="115" x2="460" y2="115" stroke="#5f6368" stroke-width="2"