<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>精美计算器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #e8f0fe 0%, #fafbfc 100%);
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        
        .calculator {
            width: 320px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(60, 64, 67, 0.15), 
                        0 8px 40px rgba(26, 115, 232, 0.1);
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        
        .calculator::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #1a73e8, #1967d2);
        }
        
        .display {
            background: linear-gradient(145deg, #1a73e8, #1557b0);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-end;
            word-wrap: break-word;
            word-break: break-all;
        }
        
        .display .history {
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            margin-bottom: 8px;
            min-height: 18px;
        }
        
        .display .result {
            color: #ffffff;
            font-size: 36px;
            font-weight: 500;
            line-height: 1.2;
        }
        
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        
        .btn {
            height: 60px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(60, 64, 67, 0.1);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn-number {
            background: #f8f9fa;
            color: #3c4043;
            border: 1px solid #e8eaed;
        }
        
        .btn-number:hover {
            background: #e8f0fe;
            border-color: #aecbfa;
        }
        
        .btn-operator {
            background: #e8f0fe;
            color: #1a73e8;
            border: 1px solid #aecbfa;
        }
        
        .btn-operator:hover {
            background: #d2e3fc;
        }
        
        .btn-operator.active {
            background: #1a73e8;
            color: #ffffff;
        }
        
        .btn-function {
            background: #fce8e6;
            color: #d93025;
            border: 1px solid #f6aea9;
        }
        
        .btn-function:hover {
            background: #f6aea9;
        }
        
        .btn-equal {
            background: linear-gradient(135deg, #1a73e8, #1967d2);
            color: #ffffff;
            grid-column: span 2;
        }
        
        .btn-equal:hover {
            background: linear-gradient(135deg, #1967d2, #1557b0);
            box-shadow: 0 4px 12px rgba(26, 115, 232, 0.3);
        }
        
        .btn-zero {
            grid-column: span 2;
        }
        
        .title {
            text-align: center;
            color: #5f6368;
            font-size: 13px;
            margin-top: 16px;
            font-weight: 400;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="display">
            <div class="history" id="history"></div>
            <div class="result" id="result">0</div>
        </div>
        <div class="buttons">
            <button class="btn btn-function" onclick="clearAll()">AC</button>
            <button class="btn btn-function" onclick="deleteLast()">DEL</button>
            <button class="btn btn-operator" onclick="appendOperator('%')">%</button>
            <button class="btn btn-operator" onclick="appendOperator('/')">÷</button>
            
            <button class="btn btn-number" onclick="appendNumber('7')">7</button>
            <button class="btn btn-number" onclick="appendNumber('8')">8</button>
            <button class="btn btn-number" onclick="appendNumber('9')">9</button>
            <button class="btn btn-operator" onclick="appendOperator('*')">×</button>
            
            <button class="btn btn-number" onclick="appendNumber('4')">4</button>
            <button class="btn btn-number" onclick="appendNumber('5')">5</button>
            <button class="btn btn-number" onclick="appendNumber('6')">6</button>
            <button class="btn btn-operator" onclick="appendOperator('-')">−</button>
            
            <button class="btn btn-number" onclick="appendNumber('1')">1</button>
            <button class="btn btn-number" onclick="appendNumber('2')">2</button>
            <button class="btn btn-number" onclick="appendNumber('3')">3</button>
            <button class="btn btn-operator" onclick="appendOperator('+')">+</button>
            
            <button class="btn btn-number btn-zero" onclick="appendNumber('0')">0</button>
            <button class="btn btn-number" onclick="appendNumber('.')">.</button>
            <button class="btn btn-equal" onclick="calculate()">=</button>
        </div>
        <div class="title">精美计算器</div>
    </div>

    <script>
        let currentInput = '0';
        let previousInput = '';
        let operator = null;
        let shouldResetScreen = false;

        const resultDisplay = document.getElementById('result');
        const historyDisplay = document.getElementById('history');

        function updateDisplay() {
            resultDisplay.textContent = formatNumber(currentInput);
            if (previousInput && operator) {
                const opSymbol = operator === '*' ? '×' : operator === '/' ? '÷' : operator;
                historyDisplay.textContent = `${formatNumber(previousInput)} ${opSymbol}`;
            } else {
                historyDisplay.textContent = '';
            }
        }

        function formatNumber(num) {
            if (num === 'Error') return num;
            const parts = num.toString().split('.');
            parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            return parts.join('.');
        }

        function appendNumber(num) {
            if (shouldResetScreen) {
                currentInput = '0';
                shouldResetScreen = false;
            }
            if (num === '.' && currentInput.includes('.')) return;
            if (currentInput === '0' && num !== '.') {
                currentInput = num;
            } else {
                currentInput += num;
            }
            updateDisplay();
        }

        function appendOperator(op) {
            if (operator !== null && !shouldResetScreen) {
                calculate();
            }
            previousInput = currentInput;
            operator = op;
            shouldResetScreen = true;
            updateDisplay();
        }

        function calculate() {
            if (operator === null || shouldResetScreen) return;
            
            let result;
            const prev = parseFloat(previousInput);
            const current = parseFloat(currentInput);
            
            switch (operator) {
                case '+':
                    result = prev + current;
                    break;
                case '-':
                    result = prev - current;
                    break;
                case '*':
                    result = prev * current;
                    break;
                case '/':
                    result = current === 0 ? 'Error' : prev / current;
                    break;
                case '%':
                    result = prev % current;
                    break;
                default:
                    return;
            }
            
            currentInput = result.toString();
            operator = null;
            previousInput = '';
            shouldResetScreen = true;
            updateDisplay();
        }

        function clearAll() {
            currentInput = '0';
            previousInput = '';
            operator = null;
            shouldResetScreen = false;
            updateDisplay();
        }

        function deleteLast() {
            if (currentInput === 'Error') {
                clearAll();
                return;
            }
            if (currentInput.length > 1) {
                currentInput = currentInput.slice(0, -1);
            } else {
                currentInput = '0';
            }
            updateDisplay();
        }

        // 键盘支持
        document.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9') appendNumber(e.key);
            if (e.key === '.') appendNumber('.');
            if (e.key === '+') appendOperator('+');
            if (e.key === '-') appendOperator('-');
            if (e.key === '*') appendOperator('*');
            if (e.key === '/') appendOperator('/');
            if (e.key === '%') appendOperator('%');
            if (e.key === 'Enter' || e.key === '=') calculate();
            if (e.key === 'Backspace') deleteLast();
            if (e.key === 'Escape') clearAll();
        });
    </script>
</body>
</html>
