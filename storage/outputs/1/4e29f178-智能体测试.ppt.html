<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能体测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
        }
        .slide {
            width: 960px;
            height: 540px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px;
        }
        .title {
            font-size: 64px;
            font-weight: bold;
            color: #333333;
            text-align: center;
            letter-spacing: 8px;
        }
    </style>
</head>
<body>
    <div class="slide">
        <h1 class="title">智能体测试</h1>
    </div>
</body>
</html>
