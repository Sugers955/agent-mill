version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: h3c
      POSTGRES_PASSWORD: h3c
      POSTGRES_DB: h3c_agent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: ./backend
    depends_on: [db]
    environment:
      DATABASE_URL: postgresql+asyncpg://h3c:h3c@db:5432/h3c_agent
      CORS_ORIGINS: http://localhost:5173,http://localhost
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
      - ./backend:/app

  web:
    build:
      context: ./frontend
    ports:
      - "5173:80"
    depends_on: [api]

volumes:
  pgdata:
