version: "3.9"

services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-agent_mill}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-agent_mill}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-agent_mill} -d ${DB_NAME:-agent_mill}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: ./backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-agent_mill}:${DB_PASSWORD}@db:5432/${DB_NAME:-agent_mill}
      CORS_ORIGINS: "${APP_BASE_URL:-http://localhost},http://localhost"
      STORAGE_ROOT: /app/storage
      SKILLS_DIR: /app/storage/skills
      UPLOADS_DIR: /app/storage/uploads
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./storage:/app/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  web:
    build:
      context: ./frontend
    restart: always
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      - api

volumes:
  pgdata:
